<div class="login-container">
    <h2>Login</h2>
  
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div>
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>
  
      <div>
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>
  
      <p *ngIf="errorMessage" style="color:red">
        {{ errorMessage }}
      </p>
  
      <button type="submit">Login</button>
    </form>
  </div>
