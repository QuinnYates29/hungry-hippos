<div class="login-container">
    <h2>Login</h2>
  
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div>
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>
  
      <div>
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>
  
      <p *ngIf="errorMessage" style="color:red">
        {{ errorMessage }}
      </p>
  
      <button type="submit">Login</button>

      <p class="login-note">
        To log in as admin, use username <strong>admin</strong> with the correct password.
        Any other username will automatically create an account and log in as a
        <strong>helper</strong>.
      </p>
      
    </form>
  </div>
