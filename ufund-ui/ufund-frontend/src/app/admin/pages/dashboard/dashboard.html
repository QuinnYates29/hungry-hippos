<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hippo Cupboard Admin</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- 🫧 Bubbles -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

  <!-- 🦛 Header -->
  <div class="header">
    <div class="hippo">🦛</div>
    <h1>Hippo Cupboard</h1>
    <button class="need-btn" (click)="openAddNeedBox()">+ Add Need</button>
    <button class="hippo-btn" (click)="openAddHippoBox()">+ Add Hippo</button>
  </div>

  <!-- 📊 Stats -->
  <div class="stats" *ngIf="!loading && needs.length > 0">
    Total Needs: {{ needs.length }}
  </div>

  <!-- ⏳ Loading -->
  <div *ngIf="loading" class="info">Loading...</div>

  <!-- 📭 Empty -->
  <div *ngIf="!loading && needs.length === 0" class="info">
    No items yet 🦛
  </div>

  <!-- 📦 Needs -->
  <div class="grid" *ngIf="!loading && needs.length > 0">
    <div class="card" *ngFor="let need of needs">
      <h3>{{ need.name }}</h3>
      <p>{{ need.type }}</p>
      <p>${{ need.cost }}</p>
      <p>Qty: {{ need.quantity }}</p>

      <div class="actions">
        <button (click)="removeNeed(need.id)">🗑</button>
        <button (click)="openEditNeedBox(need)">✏️</button>
      </div>
    </div>
  </div>

<!-- ➕ Add Need Popup -->
<div *ngIf="displayAddNeedBox" class="popup">
    <div class="popup-box">
      <h2>🦛 Add Need</h2>
  
      <label>
        Name
        <input [(ngModel)]="newNeed.name" placeholder="e.g. Canned Beans">
      </label>
  
      <label>
        Type
        <input [(ngModel)]="newNeed.type" placeholder="e.g. Food">
      </label>
  
      <label>
        Cost ($)
        <input type="number" [(ngModel)]="newNeed.cost" placeholder="0.00">
      </label>
  
      <label>
        Quantity
        <input type="number" [(ngModel)]="newNeed.quantity" placeholder="0">
      </label>
  
      <div class="popup-actions">
        <button class="primary" (click)="addNewNeed()">Add</button>
        <button (click)="closeAddNeedBox()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ➕ Add Hippo Popup -->
  <div *ngIf="displayAddHippoBox" class="popup">
    <div class="popup-box hippo-popup">
      <h2>🦛 Add Hippo</h2>
  
      <label>
        Name
        <input [(ngModel)]="newHippo.name" placeholder="e.g. Paul">
      </label>
  
      <label>
        Species
        <input [(ngModel)]="newHippo.species" placeholder="e.g. Pygmy Hippo">
      </label>

      <label>
        Gender
        <input [(ngModel)]="newHippo.gender" placeholder="e.g. Male">
      </label>

      <label>
        Birth Date
        <input type = "date" [(ngModel)]="newHippoDateStr" placeholder="e.g. 2026-1-1">
      </label>

      <label>
        Weight
        <input type="number" [(ngModel)]="newHippo.weight" placeholder="0">
      </label>

      <label>
        Latitude
        <input type="number" step="any" [(ngModel)]="newHippo.latitude" placeholder="0">
      </label>

      <label>
        Longitude
        <input type="number" step="any" [(ngModel)]="newHippo.longitude" placeholder="0">
      </label>
  
      <div class="popup-actions">
        <button class="hippo-primary" (click)="addNewHippo()">Add</button>
        <button (click)="closeAddHippoBox()">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- ✏️ Edit Popup -->
  <div *ngIf="displayEditNeedBox" class="popup">
    <div class="popup-box">
      <h2>✏️ Edit Item</h2>
  
      <label>
        Name
        <input [(ngModel)]="editCurNeed.name">
      </label>
  
      <label>
        Type
        <input [(ngModel)]="editCurNeed.type">
      </label>
  
      <label>
        Cost ($)
        <input type="number" [(ngModel)]="editCurNeed.cost">
      </label>
  
      <label>
        Quantity
        <input type="number" [(ngModel)]="editCurNeed.quantity">
      </label>
  
      <div class="popup-actions">
        <button class="primary" (click)="editNeed()">Save</button>
        <button (click)="closeEditNeedBox()">Cancel</button>
      </div>
    </div>
  </div>

</div>

</body>
</html>
